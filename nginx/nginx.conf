events {
    worker_connections 1024;
}

http {
    # ──────────────────────────────────────────
    # Upstreams
    # ──────────────────────────────────────────
    upstream order_service {
        server order-service:8000;
    }

    upstream inventory_service {
        server inventory-service:8000;
    }

    upstream notification_service {
        server notification-service:8000;
    }

    # ──────────────────────────────────────────
    # Server
    # ──────────────────────────────────────────
    server {
        listen 80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        location /orders {
            proxy_pass http://order_service;
        }

        location /inventory {
            proxy_pass http://inventory_service;
        }

        location /notifications {
            proxy_pass http://notification_service;
        }

        # 각 서비스 헬스체크 직접 라우팅
        location /order/health {
            proxy_pass http://order_service/health;
        }

        location /inventory/health {
            proxy_pass http://inventory_service/health;
        }

        location /notification/health {
            proxy_pass http://notification_service/health;
        }

        # Nginx 자체 헬스체크
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
