version: "3.9"

services:
  # ──────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sre
      POSTGRES_PASSWORD: sre_password
      POSTGRES_MULTIPLE_DATABASES: orders,inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT: 컨테이너 내부 통신, PLAINTEXT_HOST: 호스트에서 접근
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────
  # Application Services (Stage 2~4에서 구현)
  # Dockerfile이 없으면 infra만 기동: docker-compose up -d postgres redis kafka zookeeper
  # ──────────────────────────────────────────
  order-service:
    build:
      context: ./apps/order-service
    env_file:
      - ./apps/order-service/.env
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/order-service
          target: /app

  inventory-service:
    build:
      context: ./apps/inventory-service
    env_file:
      - ./apps/inventory-service/.env
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/inventory-service
          target: /app

  notification-service:
    build:
      context: ./apps/notification-service
    env_file:
      - ./apps/notification-service/.env
    ports:
      - "8003:8000"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/notification-service
          target: /app

  notification-worker:
    build:
      context: ./apps/notification-service
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ./apps/notification-service/.env
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - order-service
      - inventory-service
      - notification-service

volumes:
  postgres_data:
