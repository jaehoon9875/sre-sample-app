# 인프라만 기동: docker compose up -d
# 앱 포함 전체 기동: docker compose --profile app up -d

services:
  # ──────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    mem_limit: 256m
    environment:
      POSTGRES_USER: sre
      POSTGRES_PASSWORD: sre_password
      POSTGRES_MULTIPLE_DATABASES: orders,inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    # 로컬 개발용 경량 설정
    command: postgres -c shared_buffers=64MB -c max_connections=50
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    mem_limit: 64m
    # 메모리 한도 초과 시 오래된 키 자동 제거
    command: redis-server --maxmemory 48mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Kafka 3.7(CP 7.7)부터 Zookeeper deprecated → KRaft 모드 사용
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    mem_limit: 512m
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx400m -Xms256m"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────
  # Application Services (Stage 2~4에서 구현)
  # profile: app — 앱 Dockerfile 준비 후 사용
  # docker compose --profile app up -d
  # ──────────────────────────────────────────
  order-service:
    profiles: [app]
    build:
      context: ./apps/order-service
    mem_limit: 256m
    env_file:
      - ./apps/order-service/.env
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/order-service
          target: /app

  inventory-service:
    profiles: [app]
    build:
      context: ./apps/inventory-service
    mem_limit: 256m
    env_file:
      - ./apps/inventory-service/.env
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/inventory-service
          target: /app

  notification-service:
    profiles: [app]
    build:
      context: ./apps/notification-service
    mem_limit: 256m
    env_file:
      - ./apps/notification-service/.env
    ports:
      - "8003:8000"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/notification-service
          target: /app

  notification-worker:
    profiles: [app]
    build:
      context: ./apps/notification-service
    mem_limit: 256m
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ./apps/notification-service/.env
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  nginx:
    profiles: [app]
    image: nginx:1.25-alpine
    mem_limit: 64m
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - order-service
      - inventory-service
      - notification-service

volumes:
  postgres_data:
